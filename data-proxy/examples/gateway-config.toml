# Native Data Nexus v2 configuration.
# Canonical protocol names: mysql, postgresql
# Aliases still accepted: my_sql, postgres, postgre_sql, pg

version = "2"

[admin]
host = "0.0.0.0"
port = 8082
log_level = "INFO"

# Data-plane security shell (S0). Default off — L0 behaviour unchanged.
# See docs/data-nexus-tech-architecture-2026.md and todo.md S0–S6.
[security]
enabled = false
fail_closed = true
default_audit_level = "L0"

[security.subject]
sources = ["protocol_user"]

[security.pdp]
backend = "local"

[security.streaming]
window_rows = 256
passthrough = true

[security.audit]
queue_capacity = 65536
overflow = "drop_new"
sinks = ["tracing"]

[[listeners]]
name = "orders-mysql"
listen_addr = "0.0.0.0:9088"
protocol = "mysql"
service = "orders"
auth_policy = "orders-users"

[[services]]
name = "orders"
backend_protocol = "mysql"
endpoints = ["orders-primary", "orders-replica"]
route_policy = "orders-balance"
plugin_policies = ["orders-audit"]

[[endpoints]]
name = "orders-primary"
protocol = "mysql"
address = "127.0.0.1:3306"
database = "orders"
username = "root"
password = "root"
weight = 1

[[endpoints]]
name = "orders-replica"
protocol = "mysql"
address = "127.0.0.1:3307"
database = "orders"
username = "root"
password = "root"
weight = 1

[[route_policies]]
name = "orders-balance"
kind = "simple_load_balance"

[[auth_policies]]
name = "orders-users"
kind = "static"

[[plugin_policies]]
name = "orders-audit"
kind = "circuit_break"
regex = ["(?i)\\bdrop\\s+table\\b", "(?i)\\btruncate\\b"]
case_insensitive = true
