# B08: L2 audit result samples (bounded, post-mask). Not full-result L3.
version = "2"

[admin]
host = "0.0.0.0"
port = 8082
log_level = "INFO"

[security]
enabled = true
fail_closed = false
star_policy = "allow"
default_audit_level = "L2"

[security.streaming]
window_rows = 2
passthrough = false

[security.audit]
queue_capacity = 1024
overflow = "drop_new"
sinks = ["tracing", "file"]
file_path = "/tmp/data-nexus-audit-sample-events.jsonl"
index_path = "/tmp/data-nexus-audit-sample-index.sqlite"
sample_enabled = true
sample_max_rows = 2
sample_max_bytes = 4096
sample_inline = true

[[listeners]]
name = "orders-mysql"
listen_addr = "0.0.0.0:9088"
protocol = "mysql"
service = "orders"
auth_policy = "local-users"

[[services]]
name = "orders"
backend_protocol = "mysql"
endpoints = ["orders-primary"]
route_policy = "orders-balance"
plugin_policies = []

[[endpoints]]
name = "orders-primary"
protocol = "mysql"
address = "127.0.0.1:13306"
database = "orders"
username = "root"
password = "root"
weight = 1

[[route_policies]]
name = "orders-balance"
kind = "simple_load_balance"

[[auth_policies]]
name = "local-users"
kind = "static"
username = "root"
password = "root"
