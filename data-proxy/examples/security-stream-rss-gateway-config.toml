# A06: coarse process-memory sanity for Streaming path (not a precise window-size CI).
# window_rows=8, high max_rows so multi-window SELECT can run; no mask (pure stream).
# Dual listeners (MySQL + PG). Smoke samples cgroup/proc/ps and pins multi-window encode.
# Pair with: docker compose -f examples/docker-compose.dev.yml up -d
# Run: ./examples/smoke-security-stream-rss.sh

version = "2"

[admin]
host = "0.0.0.0"
port = 8082
log_level = "INFO"

[security]
enabled = true
fail_closed = false
star_policy = "allow"
default_audit_level = "L0"

[security.streaming]
window_rows = 8
# Allow large scans; smoke seeds tens of thousands of rows.
max_rows = 200000
passthrough = false

[security.audit]
queue_capacity = 1024
overflow = "drop_new"
sinks = ["tracing"]

[[listeners]]
name = "orders-mysql"
listen_addr = "0.0.0.0:9088"
protocol = "mysql"
service = "orders"
auth_policy = "local-users"

[[listeners]]
name = "analytics-postgresql"
listen_addr = "0.0.0.0:9089"
protocol = "postgresql"
service = "analytics"
auth_policy = "local-users"

[[services]]
name = "orders"
backend_protocol = "mysql"
endpoints = ["orders-primary"]
route_policy = "orders-balance"
plugin_policies = []

[[services]]
name = "analytics"
backend_protocol = "postgresql"
endpoints = ["analytics-primary"]
route_policy = "analytics-balance"
plugin_policies = []

[[endpoints]]
name = "orders-primary"
protocol = "mysql"
address = "127.0.0.1:13306"
database = "orders"
username = "root"
password = "root"
weight = 1

[[endpoints]]
name = "analytics-primary"
protocol = "postgresql"
address = "127.0.0.1:15433"
database = "analytics"
username = "postgres"
password = "postgres"
weight = 1

[[route_policies]]
name = "orders-balance"
kind = "simple_load_balance"

[[route_policies]]
name = "analytics-balance"
kind = "simple_load_balance"

[[auth_policies]]
name = "local-users"
kind = "static"
username = "root"
password = "root"
