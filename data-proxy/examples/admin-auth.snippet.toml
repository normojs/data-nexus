# Copy into a v2 gateway config to enable management-plane Admin API auth.
# This is NOT data-plane / table-level RBAC.
# Password UX docs: docs/admin-auth-password.md

# --- Option A: HS256 (local / break-glass) ---
[admin_auth]
enabled = true
mode = "jwt_hmac"
jwt_secret = "change-me-to-a-long-random-secret"
issuer = "data-nexus"
audience = "data-nexus-admin"
leeway_secs = 60
public_metrics = true
break_glass_password = "change-me-break-glass"
break_glass_role = "admin"
token_ttl_secs = 3600
role_claim_paths = ["roles", "groups", "realm_access.roles"]

[admin_auth.role_bindings]
"data-nexus-viewers" = "viewer"
"data-nexus-operators" = "operator"
"data-nexus-admins" = "admin"
"viewer" = "viewer"
"operator" = "operator"
"admin" = "admin"

