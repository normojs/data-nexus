# Production-oriented dual-listener gateway (template).
# DO NOT commit real secrets. Render with:
#   ./examples/prod/render-config.sh > /secure/path/gateway.toml
#   ./target/.../proxy daemon -c /secure/path/gateway.toml
#
# Pair backends with your real endpoints (not docker-compose defaults).
# See examples/prod/README.md and docs/admin-auth-password.md.

version = "2"

[admin]
host = "0.0.0.0"
port = 8082
log_level = "INFO"

# --- Management plane (required in production) ---
[admin_auth]
enabled = true
mode = "jwt_hmac"
# Prefer mode = "jwt_jwks" + jwks_url for enterprise OIDC; keep jwt_hmac only for break-glass.
jwt_secret = "__DN_JWT_SECRET__"
issuer = "data-nexus"
audience = "data-nexus-admin"
leeway_secs = 60
public_metrics = true
break_glass_password = "__DN_BREAK_GLASS_PASSWORD__"
break_glass_role = "admin"
token_ttl_secs = 3600
role_claim_paths = ["roles", "groups", "realm_access.roles"]

[admin_auth.role_bindings]
"data-nexus-viewers" = "viewer"
"data-nexus-operators" = "operator"
"data-nexus-admins" = "admin"
"viewer" = "viewer"
"operator" = "operator"
"admin" = "admin"

# --- Data plane security (on for production) ---
[security]
enabled = true
fail_closed = true
star_policy = "deny"
default_audit_level = "L0"

[security.subject]
sources = ["protocol_user"]

[security.pdp]
backend = "local"
# For Cedar: backend = "cedar", policy_dir = "/etc/data-nexus/cedar", cache_epoch_reload = true
policy_dir = ""
cache_epoch_reload = true
# F29: static Cedar entity attributes (only used when backend=cedar).
# [[security.pdp.subject_attrs]]
# subject_id = "app_ro"
# tenant = "prod"
# clearance = "internal"
# [[security.pdp.table_attrs]]
# table = "customers"
# tenant = "prod"
# clearance = "internal"
# classification = "pii"

[security.streaming]
window_rows = 256
passthrough = true
# max_rows = 100000

[security.audit]
queue_capacity = 65536
# B07: independent queue for deny/require_approval (0 disables split).
priority_queue_capacity = 1024
overflow = "drop_new"
sinks = ["tracing", "file"]
file_path = "/var/log/data-nexus/audit/events.jsonl"
max_file_bytes = 268435456
retain_days = 14
rotate_keep = 32
archive_dir = "/var/log/data-nexus/audit/archive"
# B06: SQLite side-index for Admin search (event_id/subject/decision/time/service).
# Empty disables index; queries fall back to in-memory recent ring only.
index_path = "/var/log/data-nexus/audit/index.sqlite"
# F32: max SQL chars at L1/L2 (L0 strips sql_text).
sql_text_max_chars = 2048
# B08: L2 result samples (default off). Requires default_audit_level=L2 to attach.
# sample_enabled = false
# sample_max_rows = 5
# sample_max_bytes = 4096
# sample_prefix = "samples"
# sample_inline = true
# Optional cold archive via OpenDAL (binary must be built with --features audit-opendal).
# Local:   opendal_scheme = "fs", opendal_root = "/var/log/data-nexus/audit/od"
# S3/MinIO:
#   opendal_scheme = "s3"
#   opendal_bucket = "data-nexus-audit"
#   opendal_region = "us-east-1"
#   opendal_endpoint = "https://s3.amazonaws.com"   # or http://minio:9000
#   opendal_prefix = "audit"
#   # Prefer env DN_OPENDAL_ACCESS_KEY_ID / DN_OPENDAL_SECRET_ACCESS_KEY (or AWS_*)
# Aliyun OSS:
#   opendal_scheme = "oss"
#   opendal_bucket = "data-nexus-audit"
#   opendal_endpoint = "https://oss-cn-hangzhou.aliyuncs.com"
#   opendal_prefix = "audit"

# Baseline deny for obvious secrets / DDL (tune per environment).
# --- H05 multi-instance shared state (optional; default is in-memory) ---
# When running >1 proxy process against the same policies/tickets/vault:
# - ticket/vault: JSON + advisory locks (full-file replace, not CRDT)
# - encrypt keys: 64 hex chars; vault without key never persists backend passwords
# - policy_path: shared Local PDP snapshot; policy_poll_ms mtime reload (0 = off)
# - audit index_path above should be on shared durable storage for multi-writer WAL
[security.state]
backend = "file"
ticket_path = "/var/lib/data-nexus/tickets.json"
vault_path = "/var/lib/data-nexus/vault.json"
policy_path = "/var/lib/data-nexus/local-pdp.json"
policy_poll_ms = 1000
# Prefer env substitution for keys (render-config / private env file):
ticket_encrypt_key = "__DN_TICKET_ENCRYPT_KEY__"
vault_encrypt_key = "__DN_VAULT_ENCRYPT_KEY__"

[[security.rules]]
name = "deny-secret-tables"
effect = "deny"
actions = ["select", "insert", "update", "delete", "ddl"]
tables = ["secret_*", "*.secret_*", "*.*.secret_*"]

[[security.high_risk_rules]]
name = "require-ddl-ticket"
kind = "ddl"
ticket_type = "ddl"
message = "DDL requires approval ticket"

[[security.high_risk_rules]]
name = "require-write-no-where"
kind = "write_no_where"
ticket_type = "high_risk"
message = "UPDATE/DELETE without WHERE requires ticket"

[[listeners]]
name = "orders-mysql"
listen_addr = "0.0.0.0:9088"
protocol = "mysql"
service = "orders"
auth_policy = "orders-users"

[[listeners]]
name = "analytics-postgresql"
listen_addr = "0.0.0.0:9089"
protocol = "postgresql"
service = "analytics"
auth_policy = "analytics-users"

[[services]]
name = "orders"
backend_protocol = "mysql"
endpoints = ["orders-primary"]
route_policy = "orders-balance"
plugin_policies = []

[[services]]
name = "analytics"
backend_protocol = "postgresql"
endpoints = ["analytics-primary"]
route_policy = "analytics-balance"
plugin_policies = []

[[endpoints]]
name = "orders-primary"
protocol = "mysql"
address = "__DN_MYSQL_HOST__:__DN_MYSQL_PORT__"
database = "__DN_MYSQL_DATABASE__"
username = "__DN_MYSQL_USER__"
password = "__DN_MYSQL_PASSWORD__"
weight = 1
# A08 backend TLS: disable | prefer | require
# MySQL prefer falls back to plaintext if the server lacks CLIENT_SSL;
# require fails hard (same semantics as PostgreSQL ssl_mode).
ssl_mode = "disable"
# ssl_ca_file = "/etc/ssl/certs/mysql-ca.pem"
# ssl_accept_invalid_certs = false

[[endpoints]]
name = "analytics-primary"
protocol = "postgresql"
address = "__DN_PG_HOST__:__DN_PG_PORT__"
database = "__DN_PG_DATABASE__"
username = "__DN_PG_USER__"
password = "__DN_PG_PASSWORD__"
weight = 1
ssl_mode = "disable"
# ssl_ca_file = "/etc/ssl/certs/pg-ca.pem"
# ssl_accept_invalid_certs = false

[[route_policies]]
name = "orders-balance"
kind = "simple_load_balance"

[[route_policies]]
name = "analytics-balance"
kind = "simple_load_balance"

[[auth_policies]]
name = "orders-users"
kind = "static"
username = "__DN_MYSQL_USER__"
password = "__DN_MYSQL_PASSWORD__"

[[auth_policies]]
name = "analytics-users"
kind = "static"
username = "__DN_PG_USER__"
password = "__DN_PG_PASSWORD__"
