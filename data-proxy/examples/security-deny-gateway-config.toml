# S1 security deny smoke: dual-listener + data-plane Local PDP.
# Pair with: docker compose -f examples/docker-compose.dev.yml up -d
# Run: ./examples/smoke-security-deny.sh

version = "2"

[admin]
host = "0.0.0.0"
port = 8082
log_level = "INFO"

[security]
enabled = true
fail_closed = true
default_audit_level = "L0"

[security.subject]
sources = ["protocol_user"]

[security.pdp]
backend = "local"

[security.streaming]
window_rows = 256
passthrough = true

[security.audit]
queue_capacity = 65536
overflow = "drop_new"
sinks = ["tracing", "file"]
file_path = "/tmp/data-nexus-audit-events.jsonl"
# B04 retention: small max size forces rotate under heavy load; keep few files.
max_file_bytes = 1048576
retain_days = 7
rotate_keep = 16
archive_dir = "/tmp/data-nexus-audit-archive"
# B06: SQLite side-index so Admin query survives beyond the in-memory recent ring.
index_path = "/tmp/data-nexus-audit-index.sqlite"

# Deny SELECT (and other listed actions) against secret_* tables.
[[security.rules]]
name = "deny-secret-tables"
effect = "deny"
actions = ["select", "insert", "update", "delete", "ddl"]
tables = ["secret_*", "*.secret_*", "*.*.secret_*"]

# Deny DDL for everyone (demo statement-class control).
[[security.rules]]
name = "deny-ddl"
effect = "deny"
actions = ["ddl"]

[[listeners]]
name = "orders-mysql"
listen_addr = "0.0.0.0:9088"
protocol = "mysql"
service = "orders"
auth_policy = "local-users"

[[listeners]]
name = "analytics-postgresql"
listen_addr = "0.0.0.0:9089"
protocol = "postgresql"
service = "analytics"
auth_policy = "local-users"

[[services]]
name = "orders"
backend_protocol = "mysql"
endpoints = ["orders-primary"]
route_policy = "orders-balance"
plugin_policies = []

[[services]]
name = "analytics"
backend_protocol = "postgresql"
endpoints = ["analytics-primary"]
route_policy = "analytics-balance"
plugin_policies = []

[[endpoints]]
name = "orders-primary"
protocol = "mysql"
address = "127.0.0.1:13306"
database = "orders"
username = "root"
password = "root"
weight = 1

[[endpoints]]
name = "analytics-primary"
protocol = "postgresql"
address = "127.0.0.1:15433"
database = "analytics"
username = "postgres"
password = "postgres"
weight = 1

[[route_policies]]
name = "orders-balance"
kind = "simple_load_balance"

[[route_policies]]
name = "analytics-balance"
kind = "simple_load_balance"

[[auth_policies]]
name = "local-users"
kind = "static"
username = "root"
password = "root"
