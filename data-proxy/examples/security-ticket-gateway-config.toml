# S5 high-risk ticket gate smoke (DDL requires ticket).
# Pair with docker-compose.dev.yml
# Run: ./examples/smoke-security-ticket.sh

version = "2"

[admin]
host = "0.0.0.0"
port = 8082
log_level = "INFO"

[security]
enabled = true
fail_closed = true
star_policy = "allow"
default_audit_level = "L0"

[security.subject]
sources = ["protocol_user"]

[security.pdp]
backend = "local"

[security.streaming]
window_rows = 256
passthrough = true

[security.audit]
queue_capacity = 65536
overflow = "drop_new"
sinks = ["tracing"]

# Keep secret table deny (S1).
[[security.rules]]
name = "deny-secret-tables"
effect = "deny"
actions = ["select", "insert", "update", "delete", "ddl"]
tables = ["secret_*", "*.secret_*", "*.*.secret_*"]

# S5: DDL requires short-lived ticket (do NOT also deny-ddl).
[[security.high_risk_rules]]
name = "require-ddl-ticket"
kind = "ddl"
ticket_type = "ddl"
message = "DDL requires approval ticket"

[[security.high_risk_rules]]
name = "require-write-no-where"
kind = "write_no_where"
ticket_type = "high_risk"
message = "UPDATE/DELETE without WHERE requires ticket"

[[listeners]]
name = "orders-mysql"
listen_addr = "0.0.0.0:9088"
protocol = "mysql"
service = "orders"
auth_policy = "local-users"

[[listeners]]
name = "analytics-postgresql"
listen_addr = "0.0.0.0:9089"
protocol = "postgresql"
service = "analytics"
auth_policy = "local-users"

[[services]]
name = "orders"
backend_protocol = "mysql"
endpoints = ["orders-primary"]
route_policy = "orders-balance"
plugin_policies = []

[[services]]
name = "analytics"
backend_protocol = "postgresql"
endpoints = ["analytics-primary"]
route_policy = "analytics-balance"
plugin_policies = []

[[endpoints]]
name = "orders-primary"
protocol = "mysql"
address = "127.0.0.1:13306"
database = "orders"
username = "root"
password = "root"
weight = 1

[[endpoints]]
name = "analytics-primary"
protocol = "postgresql"
address = "127.0.0.1:15433"
database = "analytics"
username = "postgres"
password = "postgres"
weight = 1

[[route_policies]]
name = "orders-balance"
kind = "simple_load_balance"

[[route_policies]]
name = "analytics-balance"
kind = "simple_load_balance"

[[auth_policies]]
name = "local-users"
kind = "static"
username = "root"
password = "root"
