# F26: Cedar PDP backend (table/action). Requires:
#   cargo build -p data-proxy --bin proxy --features security-cedar
# Prefer rustc ≥1.88 (project smoke uses 1.94.1).

version = "2"

[admin]
host = "0.0.0.0"
port = 8082
log_level = "INFO"

[security]
enabled = true
fail_closed = true
star_policy = "allow"
default_audit_level = "L0"

[security.subject]
sources = ["protocol_user"]

[security.pdp]
backend = "cedar"
policy_dir = "examples/cedar-policies"

[security.streaming]
window_rows = 256
passthrough = true

[security.audit]
queue_capacity = 65536
overflow = "drop_new"
sinks = ["tracing"]

[[listeners]]
name = "orders-mysql"
listen_addr = "0.0.0.0:9088"
protocol = "mysql"
service = "orders"
auth_policy = "local-users"

[[services]]
name = "orders"
backend_protocol = "mysql"
endpoints = ["orders-primary"]
route_policy = "orders-balance"
plugin_policies = []

[[endpoints]]
name = "orders-primary"
protocol = "mysql"
address = "127.0.0.1:13306"
database = "orders"
username = "root"
password = "root"
weight = 1

[[route_policies]]
name = "orders-balance"
kind = "simple_load_balance"

[[auth_policies]]
name = "local-users"
kind = "static"
username = "root"
password = "root"
