# H05: multi-instance file state + AES-GCM (ticket/vault). Smoke only.
# Paths under /tmp; encrypt keys are deterministic test fixtures (not secrets).
version = "2"

[admin]
host = "0.0.0.0"
port = 8082
log_level = "INFO"

[security]
enabled = true
fail_closed = false
star_policy = "allow"
default_audit_level = "L0"

[security.streaming]
window_rows = 256
passthrough = true

[security.audit]
queue_capacity = 1024
overflow = "drop_new"
sinks = ["tracing"]

[security.state]
backend = "file"
ticket_path = "/tmp/data-nexus-h05-tickets.json"
vault_path = "/tmp/data-nexus-h05-vault.json"
policy_path = "/tmp/data-nexus-h05-local-pdp.json"
policy_poll_ms = 200
# 32-byte AES keys as 64 hex (fixture only — never use in production).
ticket_encrypt_key = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
vault_encrypt_key = "fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210"

[[security.high_risk_rules]]
name = "require-ddl-ticket"
kind = "ddl"
ticket_type = "ddl"
message = "DDL requires approval ticket"

[[listeners]]
name = "orders-mysql"
listen_addr = "0.0.0.0:9088"
protocol = "mysql"
service = "orders"
auth_policy = "local-users"

[[services]]
name = "orders"
backend_protocol = "mysql"
endpoints = ["orders-primary"]
route_policy = "orders-balance"
plugin_policies = []

[[endpoints]]
name = "orders-primary"
protocol = "mysql"
address = "127.0.0.1:13306"
database = "orders"
username = "root"
password = "root"
weight = 1

[[route_policies]]
name = "orders-balance"
kind = "simple_load_balance"

[[auth_policies]]
name = "local-users"
kind = "static"
username = "root"
password = "root"
