# A10 PortalSuspended smoke: security max_rows high so client Execute page can stop early with remainder.
# Base stream smoke uses max_rows=1 (policy C). This config uses max_rows=100 so page=1 → tag `s`.
version = "2"

[admin]
host = "0.0.0.0"
port = 8083
log_level = "INFO"

[security]
enabled = true
fail_closed = false
star_policy = "allow"
default_audit_level = "L0"

[security.streaming]
window_rows = 2
max_rows = 100
passthrough = true

[security.audit]
queue_capacity = 1024
overflow = "drop_new"
sinks = ["tracing"]

[[listeners]]
name = "analytics-postgresql"
listen_addr = "0.0.0.0:9090"
protocol = "postgresql"
service = "analytics"
auth_policy = "local-users"

[[services]]
name = "analytics"
backend_protocol = "postgresql"
endpoints = ["analytics-primary"]
route_policy = "analytics-balance"
plugin_policies = []

[[endpoints]]
name = "analytics-primary"
protocol = "postgresql"
address = "127.0.0.1:15433"
database = "analytics"
username = "postgres"
password = "postgres"
weight = 1

[[route_policies]]
name = "analytics-balance"
kind = "simple_load_balance"

[[auth_policies]]
name = "local-users"
kind = "static"
username = "root"
password = "root"
