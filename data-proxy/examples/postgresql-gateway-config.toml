# Native Data Nexus v2 PostgreSQL configuration.
# Same-protocol path: PostgreSQL client -> Data Nexus -> PostgreSQL backend.
# Canonical protocol name: postgresql (aliases: postgre_sql, postgres, pg)

version = "2"

[admin]
host = "0.0.0.0"
port = 8082
log_level = "INFO"

[[listeners]]
name = "analytics-postgresql"
listen_addr = "0.0.0.0:5433"
protocol = "postgresql"
service = "analytics"
auth_policy = "analytics-users"

[[services]]
name = "analytics"
backend_protocol = "postgresql"
endpoints = ["analytics-primary", "analytics-replica"]
route_policy = "analytics-balance"
plugin_policies = ["analytics-audit"]

[[endpoints]]
name = "analytics-primary"
protocol = "postgresql"
address = "127.0.0.1:5432"
database = "analytics"
username = "postgres"
password = "postgres"
weight = 1

[[endpoints]]
name = "analytics-replica"
protocol = "postgresql"
address = "127.0.0.1:5434"
database = "analytics"
username = "postgres"
password = "postgres"
weight = 1

[[route_policies]]
name = "analytics-balance"
kind = "simple_load_balance"

[[auth_policies]]
name = "analytics-users"
kind = "static"

[[plugin_policies]]
name = "analytics-audit"
kind = "audit"
