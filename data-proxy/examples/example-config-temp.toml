# run --package pisa-proxy --bin proxy daemon --config examples/example-config.toml
# run --package pisa-proxy --bin proxy daemon --config data-proxy/examples/example-config.toml
# api 配置块，对应命令行参数和环境变量
[admin]
# api 地址
host = "0.0.0.0"
# api 端口
port = 8082
# 日志级别
log_level = "INFO"

# pisa-proxy 代理配置块
[proxy]
# 权限配置 - 配置代理账号、数据库权限、表权限、视图权限、字段权限
[[proxy.auth.config]]
level = 5
db = "data-nexus"
# 数据库 user
user = "root"
# 数据库 password
password = "my-secret-pw"
# 数据库地址
host = "192.168.1.254"
# 数据库端口
port = 3306

# config a proxy
[[proxy.config]]
# 必须proxy开头
name = "proxy001"
# 数据库配置默认为5，数字越小优先级越大
level = 1
# proxy 代理地址
listen_addr = "0.0.0.0:9088"
# proxy 认证用户名
user = "root"
# proxy 认证密码
password = "12345678"
# proxy schema
db = "test"
node_type = "mysql"
# proxy 与后端数据库建连连接池大小，值范围：1 ~ 255, 默认值：64
pool_size = 3
# 服务端版本
server_version = "8.1.0"
version = "5.7.37"

# TODO: 云端配置，用以替换proxy.config部分参数
