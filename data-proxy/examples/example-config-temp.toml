# 后端数据源配置，cloud进行替代
[nodes]
[[nodes.node]]
version = "8.1.0"
node_type = "mysql"
# 数据源 name
name = "node001"
# database name
db = "uni-proxy"
# 数据库 user
user = "root"
# 数据库 password
password = "my-secret-pw"
# 数据库地址
host = "192.168.1.254"
# 数据库端口
port = 3306
# 负载均衡节点权重
weight = 1
role = "read"
